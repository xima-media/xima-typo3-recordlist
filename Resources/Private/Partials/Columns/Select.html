{namespace xm=Xima\XimaTypo3Recordlist\ViewHelpers}
<f:be.pageRenderer includeJavaScriptModules="{0: '@xima/recordlist/recordlist-col-select.js'}" />

<span class="badge-container select-badge-container">
    <f:if condition="{item._{colConfig.columnName}}">
        <f:for each="{item._{colConfig.columnName}}" as="relation">
            <f:if condition="{item.editable}">
                <f:then>
                    <xm:link.editRecord
                        title="{f:translate(key:'LLL:EXT:xima_typo3_recordlist/Resources/Private/Language/locallang.xlf:table.button.edit')}"
                        returnUrl="{f:be.uri(route: moduleName)}"
                        table="{table}"
                        uid="{item.uid}"
                        class="badge badge-pill select-badge{f:if(condition: '{relation.value} == {colConfig.filter.value}', then: ' badge-primary')}"
                        workspaceId="{workspaceId}"
                        additionalAttributes="{'data-field-name': colConfig.columnName, 'data-value': relation.value}">
                        <f:if condition="{colConfig.filter.iconIdentifier}">
                            <core:icon identifier="{colConfig.filter.iconIdentifier}" size="small" />
                        </f:if>
                        {relation.label->f:format.crop(maxCharacters: 20)}
                    </xm:link.editRecord>
                </f:then>
                <f:else>
                    {relation.label->f:format.crop(maxCharacters: 20)}
                </f:else>
            </f:if>
        </f:for>
    </f:if>
</span>
